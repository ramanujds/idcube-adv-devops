name: part-inventory-and-order-services

services:
  part-inventory-service:
    build:
      context: ./part-inventory-service-node
      dockerfile: Dockerfile
    image: ram1uj/part-inventory-service:node
    container_name: part-inventory-service
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      NODE_ENV: production
      PORT: 8080
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/api/parts').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  part-order-service:
    image: ram1uj/part-order-service:java
    container_name: part-order-service
    restart: unless-stopped
    ports:
      - "8082:8080"
    depends_on:
      part-inventory-service:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      INVENTORY_SERVICE_URL: http://part-inventory-service:8080
