apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: inventory-service-dev
  namespace: argocd
spec:
  destination:
    namespace: dev
    server: https://kubernetes.default.svc
  sources:
    - path: inventory-app-chart
      repoURL: https://github.com/ramanujds/gitops-repo-forvia
      targetRevision: HEAD
      helm:
        releaseName: inventory-service
        valueFiles:
          - $values/environments/dev/values/inventory-values.yaml
    - repoURL: https://github.com/ramanujds/gitops-repo-forvia
      targetRevision: HEAD
      ref: values
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      enabled: true