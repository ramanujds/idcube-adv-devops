# Grafana Helm values — adds Prometheus + Loki as provisioned datasources
# Use this to upgrade the existing Grafana Helm release:
#   helm upgrade grafana grafana/grafana --version 8.12.0 -f grafana-values.yaml

adminUser: admin
adminPassword: "admin123"

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-server:80
        access: proxy
        isDefault: true

      - name: Loki
        type: loki
        url: http://loki:3100
        access: proxy
        isDefault: false
