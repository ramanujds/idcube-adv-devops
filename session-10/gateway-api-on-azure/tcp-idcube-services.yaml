# HTTPRoute for all idcube services
# Works with both GatewayClass options — only parentRefs.name changes:
#   approuting-istio  → use with gateway.yaml (App Routing add-on)
#   azure-alb-external → use with Application Gateway for Containers
#
# Routes:
#   /orders     → part-order-service:80     (Java Spring Boot, containerPort 8080)
#   /inventory  → part-inventory-service:80 (.NET ASP.NET Core, containerPort 8080)
#   /parts      → part-inventory-service:80
#   /           → part-order-service:80     (catch-all, must be last)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: part-services-route
  namespace: default
spec:
  parentRefs:
    - name: idcube-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /orders
      backendRefs:
        - name: part-order-service
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /inventory
      backendRefs:
        - name: part-inventory-service
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /parts
      backendRefs:
        - name: part-inventory-service
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: part-order-service
          port: 80
