apiVersion: apps/v1
kind: Deployment
metadata:
  name: part-inventory-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: part-inventory-service
  template:
    metadata:
      labels:
        app: part-inventory-service
    spec:
#      initContainers:
#        - name: init-db-connection
#          image: busybox
#          command: ['sh', '-c', 'echo "Checking DB connection..."; until nc -z $MYSQL_HOST $MYSQL_PORT; do echo "Waiting for DB..."; sleep 5; done; echo "DB is up!"']
#          env:
#            - name: MYSQL_HOST
#              value: "mysql.default.svc.cluster.local"
#            - name: MYSQL_PORT
#              value: "3306"

      containers:
        - name: part-inventory-service
          image: ram1uj/part-inventory-service
          imagePullPolicy: Always
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "dev"
            - name: MYSQL_HOST
              value: "mysql.default.svc.cluster.local"
            - name: MYSQL_PORT
              value: "3306"
            - name: MYSQL_DATABASE
              value: "part_inventory_db"
            - name: MYSQL_USER
              value: "root"
            - name: MYSQL_PASSWORD
              value: "password"
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: log-volume
              mountPath: /app/logs
          resources:
              requests:
                memory: "256Mi"
                cpu: "400m"
              limits:
                memory: "512Mi"
                cpu: "600m"

        # --- Promtail sidecar: ships logs from shared volume to Loki ---
        - name: promtail
          image: grafana/promtail:2.9.8
          args:
            - -config.file=/etc/promtail/promtail.yaml
            - -config.expand-env=true
          env:
            - name: APP_NAME
              value: "part-inventory-service"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: log-volume
              mountPath: /app/logs
              readOnly: true
            - name: promtail-config
              mountPath: /etc/promtail
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"

      volumes:
        - name: log-volume
          persistentVolumeClaim:
            claimName: log-pvc
        - name: promtail-config
          configMap:
            name: promtail-config
