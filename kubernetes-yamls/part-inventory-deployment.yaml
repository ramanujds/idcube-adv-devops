apiVersion: apps/v1
kind: Deployment
metadata:
  name: part-inventory-service
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1  # At most, 1 pod can be unavailable during the update
      maxSurge: 1        # At most, 1 extra pod will be created during the update
  selector:
    matchLabels:
      app: part-inventory-service
  template:
    metadata:
      labels:
        app: part-inventory-service
        version: v1
    spec:
      tolerations:
        - key: "type"
          operator: "Equal"
          value: "ssd"
          effect: "NoSchedule"
#      affinity:
#        podAntiAffinity:
#          preferredDuringSchedulingIgnoredDuringExecution:
#            - weight: 100
#              podAffinityTerm:
#                labelSelector:
#                  matchExpressions:
#                    - key: app
#                      operator: In
#                      values:
#                        - part-inventory-service
#                topologyKey: kubernetes.io/hostname
      containers:
        - name: part-inventory-service
          image: ram1uj/part-inventory-service:dotnet
          imagePullPolicy: Always
          resources:
            requests:
              cpu: "400m"
              memory: "512Mi"
            limits:
              cpu: "800m"
              memory: "1024Mi"
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "dev"

          ports:
            - containerPort: 8080
